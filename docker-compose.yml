services:

  
  # ------------------------------------------------------------------
  # ZONE RAW : stockage objet compatible S3 (MinIO)
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  # ------------------------------------------------------------------
  # ZONE STAGING : MySQL (donnees tabulaires nettoyees et typees)
  # ------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=staging
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # ZONE CURATED : MongoDB (documents enrichis : indicateurs + scores)
  # ------------------------------------------------------------------
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ------------------------------------------------------------------
  # Base de metadonnees d'Airflow (ce n'est PAS une zone du data lake)
  # ------------------------------------------------------------------
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ------------------------------------------------------------------
  # ORCHESTRATION : Airflow (init / webserver / scheduler)
  # ------------------------------------------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: dockerfile
    image: finance-datalake-airflow:latest
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: >
      bash -c "airflow db init && airflow users delete --username airflow || true && airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    image: finance-datalake-airflow:latest
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=data_lake_secret_key
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: finance-datalake-airflow:latest
    container_name: airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: scheduler

volumes:
  minio_data:
  mysql_data:
  mongo_data:
  postgres_data: